name: publish

# On a `v*` tag: lint + typecheck + test, build, publish to PyPI via Trusted
# Publishing (OIDC), then cut a GitHub Release with auto-generated notes.
# Manual dispatch (`workflow_dispatch`) runs only the checks (no publish) —
# handy for testing CI on a branch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync
      - run: uv run ruff check src/
      - run: uv run mypy --strict src/
      - run: uv run pytest

  publish:
    needs: check
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC Trusted Publishing — no API token needed.
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
